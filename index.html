<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sailing Passage Planner</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-mode="user">
  <!-- MAP VIEW -->
  <div id="view-map" class="view">
    <header class="command-bar">
      <div class="command-brand">
        <strong>Passage Planner</strong>
        <span class="build-number"><!--BUILD_NUMBER--></span>
      </div>

      <div class="command-group">
        <div class="radio-inline">
          <input type="radio" name="time-mode" id="mode-departure" value="departure" checked>
          <label for="mode-departure">Depart</label>
          <input type="radio" name="time-mode" id="mode-arrival" value="arrival">
          <label for="mode-arrival">Arrive</label>
        </div>
        <input type="date" id="departure-date">
        <input type="time" id="departure-time" step="900">
      </div>

      <div class="command-actions">
        <button id="calculate-btn" class="primary-btn">Create Sailing Plan</button>
        <button id="clear-btn" class="secondary-btn">Clear plan</button>
        <a href="#/settings" class="gear-btn" title="Settings — comfort &amp; passage parameters">⚙</a>
      </div>
    </header>

    <p class="hint command-hint" id="time-hint">When you plan to leave — draw your rough course on the map, then create the plan</p>

    <!-- Panels are SIBLINGS of #map, never children: as children every click on a
         panel would also reach Leaflet and move the start/end marker. -->
    <main class="map-stage">
      <div id="map"></div>

      <!-- Weather timeline: appears when a weather layer is on and forecast
           data has loaded. Drives the animated wind/isobar overlays. -->
      <div class="weather-timeline hidden" id="weather-timeline">
        <button type="button" class="wt-play" title="Play / pause the forecast">▶</button>
        <div class="wt-track">
          <input type="range" class="wt-slider" aria-label="Forecast time">
          <span class="wt-now-tick hidden" title="Now"></span>
          <span class="wt-depart-tick hidden"></span>
        </div>
        <span class="wt-label"></span>
        <button type="button" class="wt-speed" title="Playback speed">1×</button>
      </div>

      <aside class="floating-panel panel-route" id="route-panel">
        <div class="panel-head">
          <h2>Route</h2>
          <button type="button" class="panel-collapse" data-panel="route-panel">−</button>
        </div>
        <div class="panel-body">
          <div class="route-actions">
            <button id="route-suggest" class="route-action" title="Auto-generate a rough course you can then edit">Suggest</button>
            <button id="route-reverse" class="route-action" title="Reverse the route">Reverse</button>
            <button id="route-clear" class="route-action" title="Delete the drawn route">Clear route</button>
          </div>
          <div class="route-actions">
            <div class="route-export" id="route-export">
              <button type="button" id="route-export-btn" class="route-action" aria-haspopup="true" aria-expanded="false" title="Export the drawn route">Export route ▾</button>
              <div class="route-export-menu" id="route-export-menu" hidden>
                <button type="button" class="route-export-opt" data-format="gpx">GPX — chart plotter</button>
                <button type="button" class="route-export-opt" data-format="csv">CSV</button>
              </div>
            </div>
            <button type="button" id="route-import" class="route-action" title="Import a GPX or CSV route">Import…</button>
            <input type="file" id="route-import-file" accept=".gpx,.csv,.txt" hidden>
          </div>
          <div class="route-variation">
            <label for="route-variation">Mag. variation</label>
            <input type="number" id="route-variation" step="0.1" min="0" placeholder="0" class="coord-input">
            <select id="route-variation-sign">
              <option value="W">W</option>
              <option value="E">E</option>
            </select>
          </div>
          <div id="route-content"></div>
        </div>
      </aside>

      <aside class="floating-panel panel-layers" id="layers-panel">
        <div class="panel-head">
          <h2>Layers</h2>
          <button type="button" class="panel-collapse" data-panel="layers-panel">−</button>
        </div>
        <div class="panel-body">
          <div id="layers-content"></div>
        </div>
      </aside>

      <aside class="floating-panel panel-trail" id="trail-panel">
        <div class="panel-head">
          <h2>Decision trail</h2>
          <button type="button" class="panel-collapse" data-panel="trail-panel">−</button>
        </div>
        <div class="panel-body">
          <div id="status-box" class="status-box hidden"></div>
          <div id="passage-warnings" class="passage-warnings hidden"></div>
          <div id="trail-content"></div>
        </div>
      </aside>
    </main>

    <!-- Mobile only: edge tabs slide the panels in from their side; the backdrop
         (or the panel's − button) slides them back out. On desktop these are
         hidden and the panels float as before. -->
    <button type="button" class="panel-fab fab-route" data-open="route-panel" aria-label="Open route panel">Route</button>
    <button type="button" class="panel-fab fab-layers" data-open="layers-panel" aria-label="Open layers menu">Layers</button>
    <button type="button" class="panel-fab fab-trail" data-open="trail-panel" aria-label="Open decision trail">Trail</button>
    <div class="panel-backdrop" id="panel-backdrop"></div>
  </div>

  <!-- SETTINGS VIEW -->
  <div id="view-settings" class="view hidden">
    <header class="settings-bar">
      <a href="#" class="secondary-btn back-btn">← Back to map</a>
      <h1>Settings</h1>
      <p class="hint">Every number the planner uses, and what it actually does. Changes are saved automatically and survive a reload.</p>
    </header>
    <main id="settings-content" class="settings-page"></main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="src/ui/app.js"></script>
</body>
</html>
